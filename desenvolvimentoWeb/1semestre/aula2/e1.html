<docktype html>
<html lang="pt-br">
    <head>
        <title>Exemplo 1</title>
        <meta charset="utf-8">
    </head>
    <body>
        <form>
            <div style="background-color:aquamarine">
                <label for="nome">Nome</label>
                <input id="nome" placeholder="Digite seu Nome">
            </div>
            <div style="background-color: bisque;">
                <label for="idade">Idade</label>
                <input id="idade" placeholder="Digite sua Idade" type="number" min="18">
            </div>
            <div style="background-color: pink;">
                <label>Dia da semana</label>
                <select id="diaSemana">
                    <option>Domingo</option>
                    <option>Segunda-feira</option>
                    <option>Terça-feira</option>
                    <option>Quarta-feira</option>
                    <option>Quinta-feira</option>
                    <option>Sexta-feira</option>
                    <option>Sabado</option>
                </select>
            </div>
            <div style="background-color: darkviolet;">
                <input type="checkbox" value="Massa" name="comida" id="massa">
                <label for="massa" style="color:yellow">Massa</label>
                <input type="checkbox" value="Carne" name="comida" id="carne">
                <label for="carne" style="color:yellow">Carne</label>
                <input type="checkbox" value="Salada" name="comida" id="salada">
                <label for="salada" style="color:yellow">Salada</label>
            </div>
            <div style="background-color:brown">
                <textarea rows="5" cols="70"></textarea>
            </div>
            <div style="background-color:darkorange">
                <button style="background-color:aqua; color:black">Salvar</button>
                <button style="background-color:aqua; color:black">Limpar</button>
            </div>
        </form>
    </body>
</html>
